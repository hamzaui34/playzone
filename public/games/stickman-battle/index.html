<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stickman Battle Arena - PlayZone</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        
        body {
            background: linear-gradient(135deg, #1a0a0a 0%, #2d1b1b 50%, #1a0a0a 100%);
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Russo One', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
            position: fixed;
            touch-action: none;
        }
        
        #gameContainer {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #0a0505 0%, #1a0a0a 100%);
            overflow: hidden;
        }
        
        #gameCanvas { width: 100%; height: 100%; display: block; }
        
        .ui-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
        }
        
        .stat-box {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .stat-label { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 22px; color: #fff; }
        
        .health-bar-container {
            width: 180px;
        }
        
        .health-bar {
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #ff4444;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff6666);
            transition: width 0.3s;
            box-shadow: 0 0 15px #ff4444;
        }
        
        .wave-badge {
            background: linear-gradient(135deg, #ffd700, #ff8800);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 16px;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 200, 0, 0.5);
        }
        
        .weapon-display {
            position: absolute;
            bottom: 100px;
            left: 20px;
            display: flex;
            gap: 8px;
            z-index: 12;
        }
        
        .weapon-slot {
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.2s;
        }
        
        .weapon-slot.active {
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            transform: scale(1.1);
        }
        
        .weapon-slot.locked {
            opacity: 0.4;
            filter: grayscale(1);
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 5, 5, 0.95);
            z-index: 20;
        }
        
        .title {
            font-size: clamp(28px, 5vw, 52px);
            font-weight: 900;
            color: #ff4444;
            text-shadow: 0 0 30px #ff4444, 0 0 60px #ff0000;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: clamp(12px, 2vw, 16px);
            color: rgba(255,255,255,0.6);
            margin-bottom: 25px;
            letter-spacing: 2px;
        }
        
        .btn {
            padding: 16px 45px;
            font-size: clamp(14px, 2vw, 20px);
            font-family: 'Russo One', sans-serif;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 0, 0, 0.6);
        }
        
        .final-score {
            font-size: clamp(20px, 4vw, 36px);
            color: #ffd700;
            margin: 15px 0;
            text-shadow: 0 0 20px #ffd700;
        }
        
        .high-score {
            color: #ff6b6b;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 15;
        }
        
        .ctrl-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 0, 0, 0.15);
            border: 2px solid rgba(255, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.15s;
            backdrop-filter: blur(10px);
        }
        
        .ctrl-btn:active, .ctrl-btn.active {
            background: rgba(255, 0, 0, 0.5);
            border-color: #ff4444;
            transform: scale(0.9);
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.5);
        }
        
        .combo-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #ffd700;
            text-shadow: 0 0 30px #ffd700;
            opacity: 0;
            pointer-events: none;
        }
        
        .combo-text.show {
            animation: comboAnim 0.8s forwards;
        }
        
        @keyframes comboAnim {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5) translateY(-30px); }
        }
        
        .instructions {
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            margin-top: 15px;
        }
        
        .hidden { display: none !important; }
        
        .kill-counter {
            position: absolute;
            top: 70px;
            right: 20px;
            color: #ff4444;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div class="ui-bar">
            <div class="stat-box health-bar-container">
                <div class="health-bar">
                    <div class="health-fill" id="healthFill" style="width: 100%"></div>
                </div>
            </div>
            <div class="wave-badge" id="waveBadge">WAVE 1</div>
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="scoreDisplay">0</div>
            </div>
        </div>
        
        <div class="kill-counter" id="killCounter">KILLS: 0</div>
        
        <div class="weapon-display">
            <div class="weapon-slot active" id="weapon0">👊</div>
            <div class="weapon-slot" id="weapon1">🗡️</div>
            <div class="weapon-slot locked" id="weapon2">⚔️</div>
            <div class="weapon-slot locked" id="weapon3">💥</div>
        </div>
        
        <div class="combo-text" id="comboText"></div>
        
        <div id="controls" class="hidden">
            <button class="ctrl-btn" id="leftBtn">◀</button>
            <button class="ctrl-btn" id="attackBtn">💥</button>
            <button class="ctrl-btn" id="rightBtn">▶</button>
            <button class="ctrl-btn" id="switchBtn">🔄</button>
        </div>
        
        <div id="startScreen">
            <div class="title">STICKMAN BATTLE</div>
            <div class="subtitle">ARENA</div>
            <button class="btn" id="startBtn">FIGHT!</button>
            <div class="instructions">ARROW KEYS TO MOVE • ATTACK TO FIGHT</div>
        </div>
        
        <div id="gameOverScreen" class="hidden">
            <div class="title" style="font-size: clamp(24px, 4vw, 40px);">DEFEATED</div>
            <div class="final-score">SCORE: <span id="finalScore">0</span></div>
            <div class="high-score">WAVE: <span id="finalWave">0</span> • KILLS: <span id="finalKills">0</span></div>
            <div class="high-score">HIGH SCORE: <span id="highScore">0</span></div>
            <button class="btn" id="restartBtn">REMATCH</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Audio
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            switch(type) {
                case 'attack':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.1);
                    break;
                case 'hit':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                    break;
                case 'wave':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.15);
                    osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.4);
                    break;
                case 'death':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.4);
                    break;
            }
        }
        
        // Game State
        let gameRunning = false;
        let score = 0;
        let wave = 1;
        let kills = 0;
        let health = 100;
        let frameCount = 0;
        let combo = 0;
        let comboTimer = 0;
        
        // Weapons
        const weapons = [
            { name: 'Fists', emoji: '👊', damage: 25, unlock: 0 },
            { name: 'Knife', emoji: '🗡️', damage: 40, unlock: 500 },
            { name: 'Sword', emoji: '⚔️', damage: 60, unlock: 1500 },
            { name: 'Axe', emoji: '💥', damage: 100, unlock: 3000 }
        ];
        let currentWeapon = 0;
        
        // Player
        const player = {
            x: 150,
            y: 0,
            width: 40,
            height: 70,
            speed: 5,
            facing: 1,
            isAttacking: false,
            attackFrame: 0,
            groundY: 0,
            
            attack() {
                if (!this.isAttacking) {
                    this.isAttacking = true;
                    this.attackFrame = 15;
                    playSound('attack', 0.2);
                }
            },
            
            update() {
                if (this.isAttacking) {
                    this.attackFrame--;
                    if (this.attackFrame <= 0) {
                        this.isAttacking = false;
                    }
                }
            },
            
            draw() {
                const x = this.x;
                const y = this.y;
                const f = this.facing;
                
                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.beginPath();
                ctx.ellipse(x + this.width/2, this.groundY + 5, 25, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Body color
                const bodyColor = '#00ff88';
                const outlineColor = '#00cc66';
                
                ctx.strokeStyle = outlineColor;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                
                // Head
                ctx.beginPath();
                ctx.arc(x + this.width/2, y + 12, 14, 0, Math.PI * 2);
                ctx.stroke();
                
                // Body
                ctx.beginPath();
                ctx.moveTo(x + this.width/2, y + 26);
                ctx.lineTo(x + this.width/2, y + 50);
                ctx.stroke();
                
                // Legs
                const legAnim = Math.sin(frameCount * 0.3) * 10;
                ctx.beginPath();
                ctx.moveTo(x + this.width/2, y + 50);
                ctx.lineTo(x + this.width/2 - 12 + legAnim, y + 70);
                ctx.moveTo(x + this.width/2, y + 50);
                ctx.lineTo(x + this.width/2 + 12 - legAnim, y + 70);
                ctx.stroke();
                
                // Arms
                if (this.isAttacking) {
                    // Attack pose
                    const weapon = weapons[currentWeapon];
                    ctx.font = '28px Arial';
                    ctx.fillText(weapon.emoji, x + this.width/2 + (f * 25), y + 40);
                    
                    // Attack motion
                    ctx.beginPath();
                    ctx.moveTo(x + this.width/2, y + 35);
                    ctx.lineTo(x + this.width/2 + f * 30, y + 35);
                    ctx.stroke();
                } else {
                    // Idle pose
                    const armAnim = Math.sin(frameCount * 0.2) * 5;
                    ctx.beginPath();
                    ctx.moveTo(x + this.width/2, y + 35);
                    ctx.lineTo(x + this.width/2 - 15, y + 50 + armAnim);
                    ctx.moveTo(x + this.width/2, y + 35);
                    ctx.lineTo(x + this.width/2 + 15, y + 50 - armAnim);
                    ctx.stroke();
                }
            }
        };
        
        // Enemies
        let enemies = [];
        let particles = [];
        
        function createEnemy(waveNum) {
            const types = ['basic', 'fast', 'tank', 'boss'];
            let type = 'basic';
            let hp = 30, speed = 2, size = 40, points = 100, color = '#ff4444';
            
            const rand = Math.random();
            if (waveNum > 3 && rand < 0.2) {
                type = 'fast';
                hp = 20;
                speed = 4;
                size = 35;
                points = 150;
                color = '#ff8800';
            } else if (waveNum > 5 && rand < 0.1) {
                type = 'tank';
                hp = 80;
                speed = 1.5;
                size = 55;
                points = 250;
                color = '#aa0000';
            } else if (waveNum % 5 === 0 && rand < 0.05) {
                type = 'boss';
                hp = 200 + waveNum * 30;
                speed = 1;
                size = 80;
                points = 1000;
                color = '#ff0000';
            }
            
            hp += waveNum * 5;
            speed += waveNum * 0.1;
            
            return {
                x: canvas.width + 50,
                y: player.groundY - size,
                width: size,
                height: size,
                hp: hp,
                maxHp: hp,
                speed: speed,
                type: type,
                points: points,
                color: color,
                frame: Math.random() * Math.PI * 2,
                attackTimer: 0
            };
        }
        
        function createBlood(x, y) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12 - 3,
                    life: 40,
                    color: '#ff0000',
                    size: Math.random() * 8 + 3
                });
            }
        }
        
        function drawBackground() {
            // Dark arena
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0505');
            gradient.addColorStop(0.5, '#1a0a0a');
            gradient.addColorStop(1, '#0a0505');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Arena floor
            ctx.fillStyle = '#1a0a0a';
            ctx.fillRect(0, player.groundY, canvas.width, canvas.height - player.groundY);
            
            // Floor pattern
            ctx.strokeStyle = 'rgba(50, 20, 20, 0.5)';
            ctx.lineWidth = 2;
            for (let i = 0; i < 20; i++) {
                ctx.beginPath();
                ctx.moveTo(i * 60, player.groundY);
                ctx.lineTo(i * 60 - 30, canvas.height);
                ctx.stroke();
            }
            
            // Ambient particles
            ctx.fillStyle = 'rgba(255, 50, 50, 0.3)';
            for (let i = 0; i < 20; i++) {
                const px = (i * 97 + frameCount * 0.5) % canvas.width;
                const py = (i * 53) % (canvas.height - 100) + 50;
                ctx.beginPath();
                ctx.arc(px, py, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function updateGame() {
            if (!gameRunning) return;
            
            frameCount++;
            
            // Spawn enemies
            const spawnRate = Math.max(40, 100 - wave * 8);
            if (frameCount % spawnRate === 0) {
                enemies.push(createEnemy(wave));
            }
            
            // Wave progression
            if (kills >= wave * 10) {
                wave++;
                playSound('wave', 0.3);
                document.getElementById('waveBadge').textContent = `WAVE ${wave}`;
                showComboText(`WAVE ${wave}!`);
                
                // Unlock weapons
                for (let i = 0; i < weapons.length; i++) {
                    const slot = document.getElementById(`weapon${i}`);
                    if (score >= weapons[i].unlock && i > 0) {
                        slot.classList.remove('locked');
                    }
                }
            }
            
            // Player update
            player.update();
            
            // Update enemies
            enemies.forEach(e => {
                e.x -= e.speed;
                e.frame += 0.1;
                e.attackTimer++;
                
                // Attack player
                if (e.x <= player.x + player.width + 10) {
                    if (e.attackTimer > 60) {
                        health -= e.type === 'boss' ? 15 : (e.type === 'tank' ? 10 : 5);
                        e.attackTimer = 0;
                        playSound('hit', 0.3);
                        
                        if (health <= 0) {
                            gameOver();
                            return;
                        }
                    }
                }
            });
            
            // Remove off-screen enemies
            enemies = enemies.filter(e => e.x + e.width > -50 && e.hp > 0);
            
            // Player attack collision
            if (player.isAttacking && player.attackFrame > 5 && player.attackFrame < 12) {
                const attackRange = 60;
                const attackX = player.x + player.width/2 + player.facing * attackRange;
                
                enemies.forEach(e => {
                    const enemyCenterX = e.x + e.width/2;
                    if (Math.abs(attackX - enemyCenterX) < 40 && 
                        player.y < e.y + e.height && player.y + player.height > e.y) {
                        
                        const damage = weapons[currentWeapon].damage;
                        e.hp -= damage;
                        createBlood(e.x + e.width/2, e.y + e.height/2);
                        playSound('hit', 0.2);
                        
                        // Knockback
                        e.x += 20;
                        
                        // Combo
                        combo++;
                        comboTimer = 60;
                        score += weapons[currentWeapon].damage;
                        
                        if (combo > 3) {
                            showComboText(`COMBO x${combo}!`);
                        }
                        
                        if (e.hp <= 0) {
                            kills++;
                            score += e.points;
                            playSound('death', 0.3);
                        }
                    }
                });
            }
            
            // Combo decay
            if (comboTimer > 0) {
                comboTimer--;
                if (comboTimer <= 0) combo = 0;
            }
            
            // Update particles
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.4;
                p.life--;
            });
            particles = particles.filter(p => p.life > 0);
            
            updateUI();
            drawGame();
            requestAnimationFrame(updateGame);
        }
        
        function showComboText(text) {
            const el = document.getElementById('comboText');
            el.textContent = text;
            el.classList.remove('show');
            void el.offsetWidth;
            el.classList.add('show');
        }
        
        function updateUI() {
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('healthFill').style.width = Math.max(0, health) + '%';
            document.getElementById('killCounter').textContent = `KILLS: ${kills}`;
        }
        
        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBackground();
            
            // Draw particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 40;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            
            // Draw enemies
            enemies.forEach(e => {
                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.beginPath();
                ctx.ellipse(e.x + e.width/2, e.groundY + 5, e.width/2, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Body
                ctx.strokeStyle = e.color;
                ctx.lineWidth = 4;
                ctx.shadowColor = e.color;
                ctx.shadowBlur = e.type === 'boss' ? 20 : 10;
                
                // Head
                ctx.beginPath();
                ctx.arc(e.x + e.width/2, e.y + e.height * 0.2, e.width * 0.25, 0, Math.PI * 2);
                ctx.stroke();
                
                // Body
                ctx.beginPath();
                ctx.moveTo(e.x + e.width/2, e.y + e.height * 0.35);
                ctx.lineTo(e.x + e.width/2, e.y + e.height * 0.6);
                ctx.stroke();
                
                // Arms
                const armSwing = Math.sin(e.frame) * 8;
                ctx.beginPath();
                ctx.moveTo(e.x + e.width/2, e.y + e.height * 0.4);
                ctx.lineTo(e.x + e.width/2 - e.width * 0.3, e.y + e.height * 0.5 + armSwing);
                ctx.moveTo(e.x + e.width/2, e.y + e.height * 0.4);
                ctx.lineTo(e.x + e.width/2 + e.width * 0.3, e.y + e.height * 0.5 - armSwing);
                ctx.stroke();
                
                // Legs
                const legAnim = Math.sin(e.frame * 1.5) * 10;
                ctx.beginPath();
                ctx.moveTo(e.x + e.width/2, e.y + e.height * 0.6);
                ctx.lineTo(e.x + e.width/2 - 15 + legAnim, e.y + e.height);
                ctx.moveTo(e.x + e.width/2, e.y + e.height * 0.6);
                ctx.lineTo(e.x + e.width/2 + 15 - legAnim, e.y + e.height);
                ctx.stroke();
                
                ctx.shadowBlur = 0;
                
                // Health bar
                if (e.hp < e.maxHp) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                    ctx.fillRect(e.x, e.y - 15, e.width, 8);
                    ctx.fillStyle = e.color;
                    ctx.fillRect(e.x, e.y - 15, e.width * (e.hp / e.maxHp), 8);
                }
                
                // Boss label
                if (e.type === 'boss') {
                    ctx.fillStyle = '#ffd700';
                    ctx.font = 'bold 12px Russo One';
                    ctx.textAlign = 'center';
                    ctx.fillText('BOSS', e.x + e.width/2, e.y - 25);
                }
            });
            
            // Draw player
            player.groundY = canvas.height - 80;
            player.y = player.groundY - player.height;
            player.draw();
        }
        
        function startGame() {
            initAudio();
            gameRunning = true;
            score = 0;
            wave = 1;
            kills = 0;
            health = 100;
            frameCount = 0;
            combo = 0;
            enemies = [];
            particles = [];
            currentWeapon = 0;
            
            player.x = 150;
            
            // Reset weapon slots
            document.querySelectorAll('.weapon-slot').forEach((slot, i) => {
                slot.classList.toggle('active', i === 0);
                slot.classList.toggle('locked', i > 0 && score < weapons[i].unlock);
            });
            
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('controls').classList.remove('hidden');
            document.getElementById('waveBadge').textContent = 'WAVE 1';
            
            updateGame();
        }
        
        function gameOver() {
            gameRunning = false;
            playSound('death', 0.4);
            
            const highScore = Math.max(score, parseInt(localStorage.getItem('stickmanBattleHighScore') || '0'));
            localStorage.setItem('stickmanBattleHighScore', highScore.toString());
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalWave').textContent = wave;
            document.getElementById('finalKills').textContent = kills;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('controls').classList.add('hidden');
        }
        
        // Controls
        let moveLeft = false, moveRight = false;
        
        function setupBtn(id, handler) {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); handler(true); });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); handler(false); });
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); handler(true); });
            btn.addEventListener('mouseup', (e) => { e.preventDefault(); handler(false); });
            btn.addEventListener('mouseleave', (e) => { handler(false); });
        }
        
        setupBtn('leftBtn', (pressed) => { moveLeft = pressed; player.facing = -1; });
        setupBtn('rightBtn', (pressed) => { moveRight = pressed; player.facing = 1; });
        
        document.getElementById('attackBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning) player.attack();
        });
        document.getElementById('attackBtn').addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (gameRunning) player.attack();
        });
        
        document.getElementById('switchBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning) {
                currentWeapon = (currentWeapon + 1) % weapons.length;
                document.querySelectorAll('.weapon-slot').forEach((slot, i) => {
                    slot.classList.toggle('active', i === currentWeapon);
                });
            }
        });
        document.getElementById('switchBtn').addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (gameRunning) {
                currentWeapon = (currentWeapon + 1) % weapons.length;
                document.querySelectorAll('.weapon-slot').forEach((slot, i) => {
                    slot.classList.toggle('active', i === currentWeapon);
                });
            }
        });
        
        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') { moveLeft = true; player.facing = -1; }
            if (e.code === 'ArrowRight' || e.code === 'KeyD') { moveRight = true; player.facing = 1; }
            if (e.code === 'Space' || e.code === 'KeyK' || e.code === 'KeyJ') player.attack();
            if (e.code === 'KeyW' || e.code === 'KeyQ') {
                currentWeapon = (currentWeapon + 1) % weapons.length;
                document.querySelectorAll('.weapon-slot').forEach((slot, i) => {
                    slot.classList.toggle('active', i === currentWeapon);
                });
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') moveRight = false;
        });
        
        setInterval(() => {
            if (!gameRunning) return;
            if (moveLeft) player.x = Math.max(20, player.x - player.speed);
            if (moveRight) player.x = Math.min(canvas.width - player.width - 20, player.x + player.speed);
        }, 1000/60);
        
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        // Init
        player.groundY = canvas.height - 80;
        player.y = player.groundY - player.height;
        drawGame();
    </script>
</body>
</html>
