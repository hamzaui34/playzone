<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Tic Tac Toe AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; margin: 0; padding: 0; background: #0B0C10; font-family: system-ui, sans-serif; position: fixed; touch-action: none; }
    #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0; }
    
    .ui-bar { display: flex; justify-content: space-around; width: 100%; max-width: 320px; margin-bottom: 20px; gap: 12px; }
    .stat { flex: 1; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; text-align: center; }
    .stat-label { font-size: 10px; color: #9CA3AF; text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 18px; font-weight: 800; color: white; }
    .score-x { color: #06B6D4; }
    .score-o { color: #A855F7; }
    .score-d { color: #F59E0B; }
    
    #board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; max-width: 320px; aspect-ratio: 1; }
    .cell { aspect-ratio: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 64px; font-weight: 800; cursor: pointer; transition: all 0.2s; }
    .cell:hover { background: rgba(255,255,255,0.1); }
    .cell.x { color: #06B6D4; text-shadow: 0 0 20px rgba(6,182,212,0.5); }
    .cell.o { color: #A855F7; text-shadow: 0 0 20px rgba(168,85,247,0.5); }
    .cell.win { background: rgba(6,182,212,0.2); border-color: #06B6D4; animation: pulse 0.5s infinite; }
    
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
    
    .status { margin-top: 24px; text-align: center; }
    .status-text { font-size: 20px; font-weight: 700; color: white; margin-bottom: 8px; }
    .status-text.win { color: #06B6D4; }
    .status-text.lose { color: #EF4444; }
    
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; font-size: 14px; font-weight: 700; color: white; background: linear-gradient(135deg, #8B5CF6, #06B6D4); border: none; border-radius: 50px; cursor: pointer; transition: transform 0.1s; box-shadow: 0 0 20px rgba(168,85,247,0.4); margin-top: 16px; }
    .btn:active { transform: scale(0.95); }
    
    .difficulty { display: flex; gap: 8px; margin-top: 16px; }
    .diff-btn { padding: 8px 16px; font-size: 12px; font-weight: 600; color: white; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; cursor: pointer; transition: all 0.2s; }
    .diff-btn.active { background: linear-gradient(135deg, #8B5CF6, #06B6D4); border-color: transparent; }
    .diff-btn:hover:not(.active) { background: rgba(255,255,255,0.2); }
    
    .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, rgba(88,28,135,0.97), rgba(6,182,212,0.97)); z-index: 10; padding: 24px; }
    .screen.hidden { display: none; }
    .screen-title { font-size: 42px; font-weight: 800; color: white; text-shadow: 0 4px 20px rgba(0,0,0,0.3); margin-bottom: 8px; }
    .screen-subtitle { font-size: 16px; color: rgba(255,255,255,0.8); margin-bottom: 32px; }
    .instructions { text-align: center; color: rgba(255,255,255,0.7); font-size: 14px; max-width: 280px; line-height: 1.6; margin-bottom: 24px; }
  </style>
</head>
<body>
  <div id="game-container">
    <div class="ui-bar">
      <div class="stat"><div class="stat-label">You (X)</div><div class="stat-value score-x" id="score-x">0</div></div>
      <div class="stat"><div class="stat-label">Draws</div><div class="stat-value score-d" id="score-d">0</div></div>
      <div class="stat"><div class="stat-label">AI (O)</div><div class="stat-value score-o" id="score-o">0</div></div>
    </div>
    
    <div id="board">
      <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
    </div>
    
    <div class="status">
      <div class="status-text" id="status">Your turn!</div>
      <div class="difficulty">
        <button class="diff-btn" data-diff="easy">Easy</button>
        <button class="diff-btn active" data-diff="hard">Hard</button>
      </div>
      <button class="btn" id="reset-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>New Game</button>
    </div>
    
    <div id="menu-screen" class="screen">
      <div class="screen-title">Tic Tac Toe</div>
      <div class="screen-subtitle">Challenge the AI</div>
      <p class="instructions">You are X, AI is O.<br>Get three in a row to win!</p>
      <button class="btn" id="start-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Play</button>
    </div>
  </div>

  <script>
    let board = ['', '', '', '', '', '', '', '', ''];
    let player = 'X', ai = 'O', currentPlayer = 'X', gameOver = false;
    let scores = { X: 0, O: 0, D: 0 }, difficulty = 'hard';
    
    const cells = document.querySelectorAll('.cell');
    const statusEl = document.getElementById('status');
    const scoreXEl = document.getElementById('score-x');
    const scoreOEl = document.getElementById('score-o');
    const scoreDEl = document.getElementById('score-d');
    const menuScreen = document.getElementById('menu-screen');
    const diffBtns = document.querySelectorAll('.diff-btn');
    
    const winPatterns = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    
    function checkWinner(b) {
      for (const [a, c, d] of winPatterns) {
        if (b[a] && b[a] === b[c] && b[a] === b[d]) return { winner: b[a], pattern: [a, c, d] };
      }
      if (b.every(cell => cell !== '')) return { winner: 'D', pattern: [] };
      return null;
    }
    
    function minimax(b, depth, isMax) {
      const result = checkWinner(b);
      if (result) {
        if (result.winner === ai) return 10 - depth;
        if (result.winner === player) return depth - 10;
        return 0;
      }
      
      if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (b[i] === '') {
            b[i] = ai;
            best = Math.max(best, minimax(b, depth + 1, false));
            b[i] = '';
          }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (b[i] === '') {
            b[i] = player;
            best = Math.min(best, minimax(b, depth + 1, true));
            b[i] = '';
          }
        }
        return best;
      }
    }
    
    function getBestMove() {
      if (difficulty === 'easy') {
        const empty = board.map((v, i) => v === '' ? i : -1).filter(i => i !== -1);
        return empty[Math.floor(Math.random() * empty.length)];
      }
      
      let bestScore = -Infinity, bestMove = -1;
      for (let i = 0; i < 9; i++) {
        if (board[i] === '') {
          board[i] = ai;
          let score = minimax(board, 0, false);
          board[i] = '';
          if (score > bestScore) { bestScore = score; bestMove = i; }
        }
      }
      return bestMove;
    }
    
    function updateUI() {
      cells.forEach((cell, i) => {
        cell.textContent = board[i];
        cell.className = 'cell' + (board[i] ? ` ${board[i].toLowerCase()}` : '');
      });
      
      const result = checkWinner(board);
      if (result) {
        gameOver = true;
        let finalScore = 0;
        if (result.winner === 'D') {
          statusEl.textContent = "It's a Draw!";
          statusEl.className = 'status-text';
          scores.D++;
          finalScore = 5;
        } else {
          const isX = result.winner === 'X';
          statusEl.textContent = isX ? 'You Win!' : 'AI Wins!';
          statusEl.className = 'status-text ' + (isX ? 'win' : 'lose');
          scores[result.winner]++;
          result.pattern.forEach(i => cells[i].classList.add('win'));
          finalScore = isX ? 10 : 3;
        }
        scoreXEl.textContent = scores.X;
        scoreOEl.textContent = scores.O;
        scoreDEl.textContent = scores.D;
        
        if (window.parent !== window) {
          window.parent.postMessage({ type: 'gameScore', score: finalScore, gameSlug: 'tic-tac-toe' }, '*');
        }
      } else {
        statusEl.textContent = currentPlayer === 'X' ? 'Your turn!' : 'AI thinking...';
        statusEl.className = 'status-text';
      }
    }
    
    function aiMove() {
      if (gameOver) return;
      setTimeout(() => {
        const move = getBestMove();
        if (move !== -1) {
          board[move] = ai;
          currentPlayer = player;
          updateUI();
        }
      }, 500);
    }
    
    function handleClick(i) {
      if (gameOver || board[i] || currentPlayer !== player) return;
      board[i] = player;
      currentPlayer = ai;
      updateUI();
      if (!gameOver) aiMove();
    }
    
    function resetGame() {
      board = ['', '', '', '', '', '', '', '', ''];
      currentPlayer = player;
      gameOver = false;
      updateUI();
    }
    
    function startGame() {
      menuScreen.classList.add('hidden');
      resetGame();
    }
    
    cells.forEach((cell, i) => cell.onclick = () => handleClick(i));
    document.getElementById('start-btn').onclick = startGame;
    document.getElementById('reset-btn').onclick = resetGame;
    
    diffBtns.forEach(btn => {
      btn.onclick = () => {
        diffBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        difficulty = btn.dataset.diff;
      };
    });
    
    window.parent.postMessage({ type: 'gameReady', gameSlug: 'tic-tac-toe' }, '*');
  </script>
</body>
</html>
