<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Snake Classic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0B0C10; font-family: system-ui, sans-serif; }
    #game-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; }
    
    .ui-bar { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin-bottom: 12px; }
    .stat { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 8px 16px; text-align: center; }
    .stat-label { font-size: 10px; color: #9CA3AF; text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 20px; font-weight: 800; color: white; }
    .score-value { color: #06B6D4; }
    .high-value { color: #FBBF24; }
    
    #game-canvas { display: block; border-radius: 16px; box-shadow: 0 0 40px rgba(6, 182, 212, 0.2); }
    
    .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, rgba(88,28,135,0.95), rgba(6,182,212,0.95)); z-index: 10; padding: 24px; }
    .screen.hidden { display: none; }
    .screen-title { font-size: 42px; font-weight: 800; color: white; text-shadow: 0 4px 20px rgba(0,0,0,0.3); margin-bottom: 8px; }
    .screen-subtitle { font-size: 16px; color: rgba(255,255,255,0.8); margin-bottom: 32px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; font-size: 16px; font-weight: 700; color: white; background: linear-gradient(135deg, #8B5CF6, #06B6D4); border: none; border-radius: 50px; cursor: pointer; transition: transform 0.1s; box-shadow: 0 0 30px rgba(168,85,247,0.5); }
    .btn:active { transform: scale(0.95); }
    .btn-outline { background: rgba(255,255,255,0.2); box-shadow: none; margin-top: 12px; }
    .final-score { font-size: 64px; font-weight: 800; color: #06B6D4; }
    .final-label { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 24px; }
    .instructions { text-align: center; color: rgba(255,255,255,0.7); font-size: 14px; max-width: 280px; line-height: 1.6; margin-bottom: 24px; }
    
    .controls { display: none; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 16px; }
    .controls button { width: 64px; height: 64px; border-radius: 16px; background: rgba(255,255,255,0.15); border: none; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; cursor: pointer; }
    .controls button:active { background: rgba(255,255,255,0.3); }
    
    @media (hover: none) and (pointer: coarse) {
      .controls { display: grid; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div class="ui-bar">
      <div class="stat"><div class="stat-label">Score</div><div class="stat-value score-value" id="score">0</div></div>
      <div class="stat"><div class="stat-label">Best</div><div class="stat-value high-value" id="high">0</div></div>
    </div>
    <canvas id="game-canvas"></canvas>
    <div class="controls">
      <div></div><button id="up">↑</button><div></div>
      <button id="left">←</button><button id="down">↓</button><button id="right">→</button>
    </div>
    
    <div id="menu-screen" class="screen">
      <div class="screen-title">Snake</div>
      <div class="screen-subtitle">Classic snake game</div>
      <p class="instructions">Use arrow keys or swipe to move.<br>Eat the food to grow. Avoid walls and yourself!</p>
      <button class="btn" id="start-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Play</button>
    </div>
    
    <div id="gameover-screen" class="screen hidden">
      <div class="screen-title">Game Over!</div>
      <div class="final-score" id="final-score">0</div>
      <div class="final-label">Final Score</div>
      <button class="btn" id="restart-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>Play Again</button>
      <button class="btn btn-outline" id="menu-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Menu</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highEl = document.getElementById('high');
    const menuScreen = document.getElementById('menu-screen');
    const gameoverScreen = document.getElementById('gameover-screen');
    const finalScoreEl = document.getElementById('final-score');
    
    let width, height, gridSize = 20, gameRunning = false, score = 0, highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
    let snake = [], food = { x: 0, y: 0 }, direction = { x: 1, y: 0 }, nextDirection = { x: 1, y: 0 };
    let lastTime = 0, moveInterval = 120;
    
    function resize() {
      const maxSize = Math.min(window.innerWidth - 32, 400, window.innerHeight - 180);
      width = Math.floor(maxSize / gridSize) * gridSize;
      height = width;
      canvas.width = width;
      canvas.height = height;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
    }
    
    function init() {
      highEl.textContent = highScore;
      const center = Math.floor(width / gridSize / 2);
      snake = [{ x: center, y: center }, { x: center - 1, y: center }, { x: center - 2, y: center }];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      spawnFood();
      score = 0;
      scoreEl.textContent = '0';
    }
    
    function spawnFood() {
      const gridWidth = width / gridSize;
      const gridHeight = height / gridSize;
      let valid = false;
      while (!valid) {
        food.x = Math.floor(Math.random() * gridWidth);
        food.y = Math.floor(Math.random() * gridHeight);
        valid = !snake.some(seg => seg.x === food.x && seg.y === food.y);
      }
    }
    
    function update() {
      direction = { ...nextDirection };
      const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
      
      if (head.x < 0 || head.x >= width / gridSize || head.y < 0 || head.y >= height / gridSize) {
        gameOver();
        return;
      }
      
      if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
        gameOver();
        return;
      }
      
      snake.unshift(head);
      
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        spawnFood();
      } else {
        snake.pop();
      }
    }
    
    function draw() {
      ctx.fillStyle = '#0B0C10';
      ctx.fillRect(0, 0, width, height);
      
      const gradient = ctx.createRadialGradient(width/2, 0, 0, width/2, 0, height);
      gradient.addColorStop(0, 'rgba(88,28,135,0.15)');
      gradient.addColorStop(1, 'rgba(6,182,212,0.05)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
      
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      for (let x = 0; x <= width; x += gridSize) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke(); }
      for (let y = 0; y <= height; y += gridSize) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke(); }
      
      ctx.fillStyle = '#22D3EE';
      ctx.shadowColor = '#22D3EE';
      ctx.shadowBlur = 15;
      snake.forEach((seg, i) => {
        const size = gridSize - 2;
        const radius = i === 0 ? 8 : 4;
        ctx.beginPath();
        ctx.roundRect(seg.x * gridSize + 1, seg.y * gridSize + 1, size, size, radius);
        ctx.fill();
      });
      
      ctx.fillStyle = '#F59E0B';
      ctx.shadowColor = '#F59E0B';
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    
    function gameLoop(timestamp) {
      if (!gameRunning) return;
      if (timestamp - lastTime >= moveInterval) {
        update();
        lastTime = timestamp;
      }
      draw();
      if (gameRunning) requestAnimationFrame(gameLoop);
    }
    
    function startGame() {
      init();
      gameRunning = true;
      menuScreen.classList.add('hidden');
      gameoverScreen.classList.add('hidden');
      lastTime = 0;
      requestAnimationFrame(gameLoop);
    }
    
    function gameOver() {
      gameRunning = false;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
        highEl.textContent = highScore;
      }
      finalScoreEl.textContent = score;
      gameoverScreen.classList.remove('hidden');
      
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'gameScore', score: score, gameSlug: 'snake' }, '*');
      }
    }
    
    function showMenu() {
      gameRunning = false;
      menuScreen.classList.remove('hidden');
      gameoverScreen.classList.add('hidden');
    }
    
    function changeDir(x, y) {
      if (direction.x !== -x || direction.y !== -y) nextDirection = { x, y };
    }
    
    document.getElementById('start-btn').onclick = startGame;
    document.getElementById('restart-btn').onclick = startGame;
    document.getElementById('menu-btn').onclick = showMenu;
    
    document.getElementById('up').onclick = () => changeDir(0, -1);
    document.getElementById('down').onclick = () => changeDir(0, 1);
    document.getElementById('left').onclick = () => changeDir(-1, 0);
    document.getElementById('right').onclick = () => changeDir(1, 0);
    
    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; });
    canvas.addEventListener('touchmove', e => { e.preventDefault(); });
    canvas.addEventListener('touchend', e => {
      if (!gameRunning) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy)) changeDir(dx > 0 ? 1 : -1, 0);
      else changeDir(0, dy > 0 ? 1 : -1);
    });
    
    window.addEventListener('keydown', e => {
      if (!gameRunning) return;
      if (e.key === 'ArrowUp' || e.key === 'w') changeDir(0, -1);
      else if (e.key === 'ArrowDown' || e.key === 's') changeDir(0, 1);
      else if (e.key === 'ArrowLeft' || e.key === 'a') changeDir(-1, 0);
      else if (e.key === 'ArrowRight' || e.key === 'd') changeDir(1, 0);
    });
    
    window.addEventListener('resize', resize);
    resize();
    draw();
    
    window.parent.postMessage({ type: 'gameReady', gameSlug: 'snake' }, '*');
  </script>
</body>
</html>
