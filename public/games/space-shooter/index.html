<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Shooter - PlayZone</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        
        body {
            background: linear-gradient(135deg, #000011 0%, #000033 50%, #000022 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 9/16;
            background: #000011;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 150, 255, 0.4), inset 0 0 60px rgba(0, 0, 0, 0.5);
        }
        
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
        }
        
        .score-display {
            color: #00ffff;
            font-size: 14px;
            font-weight: 700;
            text-shadow: 0 0 10px #00ffff;
        }
        
        .health-bar {
            width: 80px;
            height: 12px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #00ff88;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #88ffaa);
            transition: width 0.3s;
            box-shadow: 0 0 8px #00ff88;
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 20, 0.95);
            z-index: 20;
            padding: 20px;
        }
        
        .title {
            font-size: clamp(20px, 5vw, 36px);
            font-weight: 900;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #0088ff;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            font-size: clamp(10px, 2.5vw, 14px);
            color: #fff;
            margin-bottom: 20px;
            opacity: 0.8;
        }
        
        .final-score {
            font-size: clamp(18px, 4vw, 28px);
            color: #ffd700;
            margin: 15px 0;
            text-shadow: 0 0 15px #ffd700;
        }
        
        .btn {
            padding: 12px 30px;
            font-size: clamp(12px, 2.5vw, 16px);
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #0088ff, #0044ff);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0, 136, 255, 0.4);
            margin: 8px;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(0, 136, 255, 0.6);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 15;
        }
        
        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }
        
        .control-btn:active {
            background: rgba(0, 255, 255, 0.3);
            border-color: #00ffff;
            transform: scale(0.9);
        }
        
        .move-controls {
            display: flex;
            gap: 10px;
        }
        
        #soundToggle {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            z-index: 25;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .high-score {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 8px;
        }
        
        .hidden {
            display: none !important;
        }
        
        .instructions {
            color: rgba(255, 255, 255, 0.6);
            font-size: 10px;
            margin-top: 15px;
            text-align: center;
        }
        
        @media (max-width: 500px) {
            .control-btn {
                width: 50px;
                height: 50px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <button id="soundToggle">🔊</button>
        
        <div id="ui">
            <div class="score-display">SCORE: <span id="score">0</span></div>
            <div class="health-bar">
                <div class="health-fill" id="healthFill" style="width: 100%"></div>
            </div>
        </div>
        
        <div id="controls" class="hidden">
            <div class="move-controls">
                <button class="control-btn" id="leftBtn">◀</button>
                <button class="control-btn" id="rightBtn">▶</button>
            </div>
            <div class="move-controls">
                <button class="control-btn" id="upBtn">▲</button>
                <button class="control-btn" id="downBtn">▼</button>
            </div>
            <button class="control-btn" id="shootBtn" style="width: 70px; background: rgba(0, 255, 255, 0.2); border-color: #00ffff;">🚀</button>
        </div>
        
        <div id="startScreen">
            <div class="title">SPACE SHOOTER</div>
            <div class="subtitle">Defend the galaxy!</div>
            <button class="btn" id="startBtn">LAUNCH</button>
            <div class="instructions">Use arrow buttons to move • Tap rocket to fire</div>
        </div>
        
        <div id="gameOverScreen" class="hidden">
            <div class="title">GAME OVER</div>
            <div class="final-score">SCORE: <span id="finalScore">0</span></div>
            <div class="high-score">HIGH SCORE: <span id="highScore">0</span></div>
            <button class="btn" id="restartBtn">RETRY</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let health = 100;
        let frameCount = 0;
        let soundEnabled = true;
        
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playSound(type) {
            if (!soundEnabled || !audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            switch(type) {
                case 'shoot':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.08);
                    break;
                case 'explosion':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.3);
                    break;
                case 'powerup':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
                    osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.25);
                    break;
                case 'hit':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.1);
                    break;
            }
        }
        
        // Player
        const player = {
            x: 0,
            y: 0,
            width: 40,
            height: 50,
            speed: 5,
            shootDelay: 0,
            
            reset() {
                this.x = canvas.width / 2 - this.width / 2;
                this.y = canvas.height - 100;
            },
            
            move(dx, dy) {
                this.x += dx * this.speed;
                this.y += dy * this.speed;
                this.x = Math.max(10, Math.min(canvas.width - this.width - 10, this.x));
                this.y = Math.max(50, Math.min(canvas.height - this.height - 10, this.y));
            },
            
            shoot() {
                if (this.shootDelay <= 0) {
                    bullets.push({
                        x: this.x + this.width / 2 - 3,
                        y: this.y,
                        width: 6,
                        height: 20,
                        speed: 12
                    });
                    this.shootDelay = 10;
                    playSound('shoot');
                }
            },
            
            update() {
                if (this.shootDelay > 0) this.shootDelay--;
            },
            
            draw() {
                const x = this.x;
                const y = this.y;
                
                // Engine glow
                ctx.fillStyle = 'rgba(255, 100, 0, 0.5)';
                ctx.beginPath();
                ctx.moveTo(x + 15, y + this.height);
                ctx.lineTo(x + this.width / 2, y + this.height + 20 + Math.sin(frameCount * 0.3) * 5);
                ctx.lineTo(x + this.width - 15, y + this.height);
                ctx.closePath();
                ctx.fill();
                
                // Ship body
                ctx.fillStyle = '#4488ff';
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.moveTo(x + this.width / 2, y);
                ctx.lineTo(x + this.width, y + this.height * 0.7);
                ctx.lineTo(x + this.width * 0.8, y + this.height);
                ctx.lineTo(x + this.width * 0.2, y + this.height);
                ctx.lineTo(x, y + this.height * 0.7);
                ctx.closePath();
                ctx.fill();
                
                // Cockpit
                ctx.fillStyle = '#88ccff';
                ctx.beginPath();
                ctx.ellipse(x + this.width / 2, y + this.height * 0.35, 8, 12, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Wings
                ctx.fillStyle = '#2266dd';
                ctx.beginPath();
                ctx.moveTo(x, y + this.height * 0.5);
                ctx.lineTo(x - 10, y + this.height * 0.9);
                ctx.lineTo(x + 10, y + this.height * 0.8);
                ctx.closePath();
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(x + this.width, y + this.height * 0.5);
                ctx.lineTo(x + this.width + 10, y + this.height * 0.9);
                ctx.lineTo(x + this.width - 10, y + this.height * 0.8);
                ctx.closePath();
                ctx.fill();
                
                ctx.shadowBlur = 0;
            }
        };
        
        // Bullets
        let bullets = [];
        let enemyBullets = [];
        
        // Enemies
        let enemies = [];
        
        function createEnemy() {
            const types = ['fighter', 'dart', 'heavy'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            let hp = 1, speed = 2, size = 30, points = 100;
            if (type === 'dart') {
                hp = 1;
                speed = 4;
                size = 25;
                points = 150;
            } else if (type === 'heavy') {
                hp = 3;
                speed = 1.5;
                size = 45;
                points = 300;
            }
            
            return {
                x: Math.random() * (canvas.width - 50) + 25,
                y: -50,
                width: size,
                height: size,
                hp: hp,
                maxHp: hp,
                speed: speed,
                type: type,
                points: points,
                frame: Math.random() * Math.PI * 2,
                shootTimer: Math.random() * 100 + 50
            };
        }
        
        // Powerups
        let powerups = [];
        
        function createPowerup(x, y) {
            return {
                x: x,
                y: y,
                width: 25,
                height: 25,
                type: 'health',
                frame: 0
            };
        }
        
        // Particles
        let particles = [];
        
        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 40,
                    color: color,
                    size: Math.random() * 8 + 3
                });
            }
        }
        
        function drawBackground() {
            // Space
            ctx.fillStyle = '#000011';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Stars
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 100; i++) {
                const sx = (i * 137 + frameCount * (0.2 + (i % 3) * 0.1)) % canvas.width;
                const sy = (i * 73) % canvas.height;
                const size = (i % 3) + 1;
                ctx.globalAlpha = 0.3 + (i % 5) * 0.15;
                ctx.beginPath();
                ctx.arc(sx, sy, size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            
            // Nebula
            const nebulaGradient = ctx.createRadialGradient(
                canvas.width * 0.3, canvas.height * 0.5, 0,
                canvas.width * 0.3, canvas.height * 0.5, canvas.width * 0.4
            );
            nebulaGradient.addColorStop(0, 'rgba(100, 0, 150, 0.15)');
            nebulaGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = nebulaGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        function updateGame() {
            if (!gameRunning) return;
            
            frameCount++;
            
            // Spawn enemies
            if (frameCount % 60 === 0) {
                enemies.push(createEnemy());
            }
            
            // Player update
            player.update();
            
            // Update bullets
            bullets.forEach(b => b.y -= b.speed);
            bullets = bullets.filter(b => b.y > -30);
            
            enemyBullets.forEach(b => {
                b.y += b.speed;
                b.x += Math.sin(b.frame) * 2;
                b.frame += 0.1;
            });
            enemyBullets = enemyBullets.filter(b => b.y < canvas.height + 30);
            
            // Update enemies
            enemies.forEach(e => {
                e.y += e.speed;
                e.frame += 0.05;
                
                // Enemy shooting
                e.shootTimer--;
                if (e.shootTimer <= 0 && e.y > 50) {
                    enemyBullets.push({
                        x: e.x + e.width / 2 - 4,
                        y: e.y + e.height,
                        width: 8,
                        height: 15,
                        speed: 5,
                        frame: 0
                    });
                    e.shootTimer = Math.random() * 100 + 80;
                }
            });
            
            // Remove off-screen enemies
            enemies = enemies.filter(e => e.y < canvas.height + 50);
            
            // Update powerups
            powerups.forEach(p => {
                p.y += 2;
                p.frame += 0.1;
            });
            powerups = powerups.filter(p => p.y < canvas.height + 30);
            
            // Bullet-enemy collision
            bullets.forEach(b => {
                enemies.forEach(e => {
                    if (b && e && b.x < e.x + e.width && b.x + b.width > e.x &&
                        b.y < e.y + e.height && b.y + b.height > e.y) {
                        e.hp--;
                        b.y = -100;
                        createExplosion(b.x, b.y, '#ffff00');
                        
                        if (e.hp <= 0) {
                            score += e.points;
                            createExplosion(e.x + e.width/2, e.y + e.height/2, '#ff8800');
                            playSound('explosion');
                            
                            // Drop powerup
                            if (Math.random() < 0.2) {
                                powerups.push(createPowerup(e.x + e.width/2, e.y + e.height/2));
                            }
                        }
                    }
                });
            });
            
            // Enemy-player collision
            enemies.forEach(e => {
                if (player.x < e.x + e.width && player.x + player.width > e.x &&
                    player.y < e.y + e.height && player.y + player.height > e.y) {
                    health -= 20;
                    e.hp = 0;
                    createExplosion(e.x + e.width/2, e.y + e.height/2, '#ff4444');
                    playSound('hit');
                }
            });
            
            // Enemy bullet-player collision
            enemyBullets.forEach(b => {
                if (player.x < b.x + b.width && player.x + player.width > b.x &&
                    player.y < b.y + b.height && player.y + player.height > b.y) {
                    health -= 10;
                    b.y = canvas.height + 100;
                    createExplosion(b.x, b.y, '#ff0000');
                    playSound('hit');
                }
            });
            
            // Powerup collection
            powerups = powerups.filter(p => {
                if (player.x < p.x + p.width && player.x + player.width > p.x &&
                    player.y < p.y + p.height && player.y + player.height > p.y) {
                    health = Math.min(100, health + 25);
                    playSound('powerup');
                    return false;
                }
                return true;
            });
            
            // Update particles
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
            });
            particles = particles.filter(p => p.life > 0);
            
            // Game over check
            if (health <= 0) {
                gameOver();
                return;
            }
            
            updateUI();
            drawGame();
            requestAnimationFrame(updateGame);
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('healthFill').style.width = Math.max(0, health) + '%';
        }
        
        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBackground();
            
            // Draw powerups
            powerups.forEach(p => {
                ctx.save();
                ctx.translate(p.x + p.width/2, p.y + p.height/2);
                ctx.rotate(p.frame);
                
                ctx.fillStyle = '#00ff88';
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(0, 0, p.width/2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 14px Orbitron';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('+', 0, 0);
                
                ctx.restore();
            });
            
            // Draw enemies
            enemies.forEach(e => {
                const color = e.type === 'heavy' ? '#ff4444' : (e.type === 'dart' ? '#ff88ff' : '#ff8800');
                
                ctx.fillStyle = color;
                ctx.shadowColor = color;
                ctx.shadowBlur = 10;
                
                if (e.type === 'dart') {
                    ctx.beginPath();
                    ctx.moveTo(e.x + e.width/2, e.y + e.height);
                    ctx.lineTo(e.x, e.y);
                    ctx.lineTo(e.x + e.width, e.y);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    ctx.fillRect(e.x + e.width * 0.2, e.y + e.height * 0.3, e.width * 0.6, e.height * 0.7);
                    ctx.beginPath();
                    ctx.arc(e.x + e.width/2, e.y + e.height * 0.25, e.width * 0.2, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Eyes
                ctx.fillStyle = '#ffff00';
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.arc(e.x + e.width/2 - 5, e.y + e.height * 0.5, 3, 0, Math.PI * 2);
                ctx.arc(e.x + e.width/2 + 5, e.y + e.height * 0.5, 3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
                
                // Health bar
                if (e.hp < e.maxHp) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(e.x, e.y - 8, e.width, 5);
                    ctx.fillStyle = '#ff0000';
                    ctx.fillRect(e.x, e.y - 8, e.width * (e.hp / e.maxHp), 5);
                }
            });
            
            // Draw player bullets
            ctx.fillStyle = '#00ffff';
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 10;
            bullets.forEach(b => {
                ctx.fillRect(b.x, b.y, b.width, b.height);
            });
            
            // Draw enemy bullets
            ctx.fillStyle = '#ff4444';
            ctx.shadowColor = '#ff0000';
            enemyBullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x + b.width/2, b.y + b.height/2, b.width/2, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.shadowBlur = 0;
            
            // Draw player
            player.draw();
            
            // Draw particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 40;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }
        
        function startGame() {
            initAudio();
            gameRunning = true;
            score = 0;
            health = 100;
            frameCount = 0;
            bullets = [];
            enemyBullets = [];
            enemies = [];
            powerups = [];
            particles = [];
            player.reset();
            
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('controls').classList.remove('hidden');
            
            updateUI();
            updateGame();
        }
        
        function gameOver() {
            gameRunning = false;
            
            const highScore = Math.max(score, parseInt(localStorage.getItem('spaceShooterHighScore') || '0'));
            localStorage.setItem('spaceShooterHighScore', Math.max(score, highScore).toString());
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('controls').classList.add('hidden');
        }
        
        // Event listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        // Touch controls
        let moveUp = false, moveDown = false, moveLeft = false, moveRight = false;
        
        const setupTouch = (id, setter) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); if (gameRunning) setter(true); });
            el.addEventListener('touchend', (e) => { e.preventDefault(); e.stopPropagation(); setter(false); });
            el.addEventListener('mousedown', (e) => { e.preventDefault(); if (gameRunning) setter(true); });
            el.addEventListener('mouseup', (e) => { e.preventDefault(); setter(false); });
            el.addEventListener('mouseleave', (e) => { setter(false); });
        };
        
        setupTouch('upBtn', v => moveUp = v);
        setupTouch('downBtn', v => moveDown = v);
        setupTouch('leftBtn', v => moveLeft = v);
        setupTouch('rightBtn', v => moveRight = v);
        
        document.getElementById('shootBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (gameRunning) player.shoot();
        });
        document.getElementById('shootBtn').addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (gameRunning) player.shoot();
        });
        
        // Canvas tap/click to shoot
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning) player.shoot();
        });
        canvas.addEventListener('mousedown', (e) => {
            if (gameRunning) player.shoot();
        });
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            if (e.code === 'ArrowUp' || e.code === 'KeyW') { e.preventDefault(); moveUp = true; }
            if (e.code === 'ArrowDown' || e.code === 'KeyS') { e.preventDefault(); moveDown = true; }
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') { e.preventDefault(); moveLeft = true; }
            if (e.code === 'ArrowRight' || e.code === 'KeyD') { e.preventDefault(); moveRight = true; }
            if (e.code === 'Space' || e.code === 'KeyZ' || e.code === 'KeyK') { e.preventDefault(); player.shoot(); }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowUp' || e.code === 'KeyW') moveUp = false;
            if (e.code === 'ArrowDown' || e.code === 'KeyS') moveDown = false;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') moveRight = false;
        });
        
        setInterval(() => {
            if (!gameRunning) return;
            let dx = 0, dy = 0;
            if (moveLeft) dx -= 1;
            if (moveRight) dx += 1;
            if (moveUp) dy -= 1;
            if (moveDown) dy += 1;
            if (dx !== 0 || dy !== 0) player.move(dx, dy);
        }, 1000/60);
        
        // Sound toggle
        document.getElementById('soundToggle').addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            document.getElementById('soundToggle').textContent = soundEnabled ? '🔊' : '🔇';
        });
        
        // Initial draw
        player.reset();
        drawGame();
    </script>
</body>
</html>
