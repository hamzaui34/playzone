<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zombie Defense - PlayZone</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        
        body {
            background: linear-gradient(135deg, #1a0a0a 0%, #2d1b1b 50%, #1a0a0a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16/9;
            background: linear-gradient(180deg, #0a0505 0%, #1a0a0a 100%);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3), inset 0 0 60px rgba(0, 0, 0, 0.5);
        }
        
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        
        .score-display {
            color: #ff4444;
            font-size: 18px;
            font-weight: 700;
            text-shadow: 0 0 10px #ff4444;
        }
        
        .health-bar {
            width: 150px;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #ff4444;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff6666);
            transition: width 0.3s;
            box-shadow: 0 0 10px #ff4444;
        }
        
        .wave-display {
            color: #ffd700;
            font-size: 18px;
            font-weight: 700;
            text-shadow: 0 0 10px #ffd700;
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.9);
            z-index: 20;
        }
        
        .title {
            font-size: clamp(24px, 5vw, 48px);
            font-weight: 900;
            color: #ff4444;
            text-shadow: 0 0 20px #ff4444, 0 0 40px #ff0000;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            font-size: clamp(12px, 2.5vw, 18px);
            color: #fff;
            margin-bottom: 30px;
            opacity: 0.8;
        }
        
        .final-score {
            font-size: clamp(20px, 4vw, 36px);
            color: #ffd700;
            margin: 20px 0;
            text-shadow: 0 0 15px #ffd700;
        }
        
        .btn {
            padding: 15px 40px;
            font-size: clamp(14px, 2.5vw, 18px);
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(255, 0, 0, 0.4);
            margin: 10px;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 0, 0, 0.6);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 15;
        }
        
        .control-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid rgba(255, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }
        
        .control-btn:active {
            background: rgba(255, 0, 0, 0.5);
            border-color: #ff4444;
            transform: scale(0.9);
        }
        
        #soundToggle {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            z-index: 25;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .high-score {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .hidden {
            display: none !important;
        }
        
        .instructions {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            margin-top: 20px;
            text-align: center;
        }
        
        .ammo-display {
            color: #00ff88;
            font-size: 16px;
            font-weight: 700;
            text-shadow: 0 0 10px #00ff88;
        }
        
        @media (max-width: 600px) {
            .control-btn {
                width: 60px;
                height: 60px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <button id="soundToggle">🔊</button>
        
        <div id="ui">
            <div class="health-bar">
                <div class="health-fill" id="healthFill" style="width: 100%"></div>
            </div>
            <div class="wave-display">WAVE: <span id="wave">1</span></div>
            <div class="score-display">SCORE: <span id="score">0</span></div>
            <div class="ammo-display">AMMO: <span id="ammo">20</span></div>
        </div>
        
        <div id="controls" class="hidden">
            <button class="control-btn" id="leftBtn">◀</button>
            <button class="control-btn" id="shootBtn">🔫</button>
            <button class="control-btn" id="rightBtn">▶</button>
            <button class="control-btn" id="reloadBtn">↻</button>
        </div>
        
        <div id="startScreen">
            <div class="title">ZOMBIE DEFENSE</div>
            <div class="subtitle">Survive the horde!</div>
            <button class="btn" id="startBtn">START MISSION</button>
            <div class="instructions">Use left/right to move • Tap shoot to fire</div>
        </div>
        
        <div id="gameOverScreen" class="hidden">
            <div class="title">GAME OVER</div>
            <div class="final-score">SCORE: <span id="finalScore">0</span></div>
            <div class="final-score" style="font-size: clamp(14px, 3vw, 20px);">WAVES: <span id="finalWave">0</span></div>
            <div class="high-score">HIGH SCORE: <span id="highScore">0</span></div>
            <button class="btn" id="restartBtn">TRY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let wave = 1;
        let health = 100;
        let ammo = 20;
        let frameCount = 0;
        let soundEnabled = true;
        
        // Audio
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playSound(type) {
            if (!soundEnabled || !audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            switch(type) {
                case 'shoot':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.1);
                    break;
                case 'reload':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.2);
                    break;
                case 'hit':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                    break;
                case 'zombieDeath':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.2);
                    break;
                case 'wave':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(500, audioCtx.currentTime + 0.1);
                    osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.3);
                    break;
            }
        }
        
        // Player
        const player = {
            x: 100,
            y: 0,
            width: 40,
            height: 60,
            speed: 6,
            groundY: 0,
            
            reset() {
                this.x = 100;
                this.y = this.groundY - this.height;
            },
            
            move(direction) {
                this.x += direction * this.speed;
                this.x = Math.max(20, Math.min(canvas.width - this.width - 20, this.x));
            },
            
            draw() {
                const x = this.x;
                const y = this.y;
                
                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.ellipse(x + this.width/2, this.groundY + 5, 25, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Body
                ctx.fillStyle = '#00ff88';
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = 10;
                ctx.fillRect(x + 10, y + 20, 20, 25);
                
                // Head
                ctx.beginPath();
                ctx.arc(x + this.width/2, y + 12, 12, 0, Math.PI * 2);
                ctx.fill();
                
                // Eyes
                ctx.fillStyle = '#000';
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(x + this.width/2 - 4, y + 10, 3, 0, Math.PI * 2);
                ctx.arc(x + this.width/2 + 4, y + 10, 3, 0, Math.PI * 2);
                ctx.fill();
                
                // Gun
                ctx.fillStyle = '#333';
                ctx.fillRect(x + this.width/2 + 5, y + 30, 25, 8);
                ctx.fillStyle = '#666';
                ctx.fillRect(x + this.width/2 + 20, y + 28, 12, 12);
                
                // Legs
                const legFrame = Math.floor(frameCount / 10) % 2;
                ctx.fillStyle = '#00ff88';
                ctx.fillRect(x + 12, y + 45, 6, 15 - legFrame * 3);
                ctx.fillRect(x + 22, y + 45, 6, 15 - (1 - legFrame) * 3);
                
                ctx.shadowBlur = 0;
            }
        };
        
        // Bullets
        let bullets = [];
        
        function shoot() {
            if (ammo > 0) {
                ammo--;
                bullets.push({
                    x: player.x + player.width,
                    y: player.y + 34,
                    width: 15,
                    height: 4,
                    speed: 15
                });
                playSound('shoot');
                updateUI();
            }
        }
        
        function reload() {
            ammo = 20;
            playSound('reload');
            updateUI();
        }
        
        // Zombies
        let zombies = [];
        
        function createZombie(waveNum) {
            const types = ['normal', 'fast', 'tank'];
            const weights = [0.6, 0.3, 0.1];
            let rand = Math.random();
            let type = 'normal';
            
            if (rand > weights[0]) {
                type = rand > weights[0] + weights[1] ? 'tank' : 'fast';
            }
            
            let hp = 1, speed = 1.5, size = 50;
            if (type === 'fast') {
                hp = 1;
                speed = 2.5;
                size = 40;
            } else if (type === 'tank') {
                hp = 3;
                speed = 1;
                size = 70;
            }
            
            hp += Math.floor(waveNum / 3);
            speed += waveNum * 0.1;
            
            return {
                x: canvas.width + 50,
                y: player.groundY - size,
                width: size,
                height: size,
                hp: hp,
                maxHp: hp,
                speed: speed,
                type: type,
                frame: 0,
                color: type === 'tank' ? '#8B0000' : (type === 'fast' ? '#FF6347' : '#AA3333')
            };
        }
        
        // Particles
        let particles = [];
        
        function createBlood(x, y) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 30,
                    color: '#ff0000',
                    size: Math.random() * 6 + 2
                });
            }
        }
        
        function drawBackground() {
            // Dark sky
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0505');
            gradient.addColorStop(0.6, '#1a0a0a');
            gradient.addColorStop(1, '#0a0505');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Moon
            ctx.fillStyle = '#ffffcc';
            ctx.shadowColor = '#ffffcc';
            ctx.shadowBlur = 30;
            ctx.beginPath();
            ctx.arc(canvas.width - 100, 80, 40, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Ground
            ctx.fillStyle = '#1a0a0a';
            ctx.fillRect(0, player.groundY, canvas.width, canvas.height - player.groundY);
            
            // Ground texture
            ctx.fillStyle = 'rgba(50, 20, 20, 0.5)';
            for (let i = 0; i < 30; i++) {
                const gx = (i * 40) % canvas.width;
                ctx.fillRect(gx, player.groundY + 5, 30, 3);
            }
            
            // Fog
            ctx.fillStyle = 'rgba(30, 10, 10, 0.3)';
            for (let i = 0; i < 5; i++) {
                const fogY = player.groundY - 30 + i * 20;
                ctx.fillRect(0, fogY, canvas.width, 40);
            }
        }
        
        function updateGame() {
            if (!gameRunning) return;
            
            frameCount++;
            
            // Spawn zombies
            const spawnRate = Math.max(60, 150 - wave * 10);
            if (frameCount % spawnRate === 0) {
                zombies.push(createZombie(wave));
            }
            
            // Wave progression
            if (score >= wave * 500) {
                wave++;
                playSound('wave');
            }
            
            // Update zombies
            zombies.forEach(z => {
                z.x -= z.speed;
                z.frame += 0.15;
                
                // Attack player
                if (z.x <= player.x + player.width) {
                    health -= 0.5;
                    z.x = player.x + player.width + 5;
                    playSound('hit');
                    updateUI();
                    
                    if (health <= 0) {
                        gameOver();
                        return;
                    }
                }
            });
            
            // Remove off-screen zombies
            zombies = zombies.filter(z => z.x + z.width > -50);
            
            // Update bullets
            bullets.forEach(b => {
                b.x += b.speed;
            });
            
            // Bullet-zombie collision
            bullets = bullets.filter(b => {
                let hit = false;
                zombies.forEach(z => {
                    if (!hit && b.x < z.x + z.width && b.x + b.width > z.x &&
                        b.y < z.y + z.height && b.y + b.height > z.y) {
                        z.hp--;
                        hit = true;
                        createBlood(b.x, z.y + z.height / 2);
                        
                        if (z.hp <= 0) {
                            score += z.type === 'tank' ? 100 : (z.type === 'fast' ? 30 : 50);
                            playSound('zombieDeath');
                        }
                    }
                });
                return !hit && b.x < canvas.width + 50;
            });
            
            // Update particles
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3;
                p.life--;
            });
            particles = particles.filter(p => p.life > 0);
            
            updateUI();
            drawGame();
            requestAnimationFrame(updateGame);
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('wave').textContent = wave;
            document.getElementById('ammo').textContent = ammo;
            document.getElementById('healthFill').style.width = Math.max(0, health) + '%';
        }
        
        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBackground();
            
            // Draw player
            player.groundY = canvas.height - 80;
            player.y = player.groundY - player.height;
            player.draw();
            
            // Draw zombies
            zombies.forEach(z => {
                z.y = player.groundY - z.height;
                
                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.ellipse(z.x + z.width/2, z.y + z.height + 5, z.width/2, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Body
                ctx.fillStyle = z.color;
                ctx.shadowColor = z.color;
                ctx.shadowBlur = 10;
                ctx.fillRect(z.x + z.width * 0.2, z.y + z.height * 0.3, z.width * 0.6, z.height * 0.5);
                
                // Head
                ctx.beginPath();
                ctx.arc(z.x + z.width/2, z.y + z.height * 0.2, z.width * 0.25, 0, Math.PI * 2);
                ctx.fill();
                
                // Eyes (glow)
                ctx.fillStyle = '#ff0000';
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(z.x + z.width/2 - 6, z.y + z.height * 0.18, 4, 0, Math.PI * 2);
                ctx.arc(z.x + z.width/2 + 6, z.y + z.height * 0.18, 4, 0, Math.PI * 2);
                ctx.fill();
                
                // Arms (reaching)
                const armOffset = Math.sin(z.frame) * 10;
                ctx.strokeStyle = z.color;
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.moveTo(z.x + z.width * 0.3, z.y + z.height * 0.4);
                ctx.lineTo(z.x - 10, z.y + z.height * 0.4 + armOffset);
                ctx.moveTo(z.x + z.width * 0.7, z.y + z.height * 0.4);
                ctx.lineTo(z.x - 10, z.y + z.height * 0.4 - armOffset);
                ctx.stroke();
                
                ctx.shadowBlur = 0;
                
                // Health bar for tank
                if (z.type === 'tank' && z.hp < z.maxHp) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(z.x, z.y - 10, z.width, 6);
                    ctx.fillStyle = '#ff0000';
                    ctx.fillRect(z.x, z.y - 10, z.width * (z.hp / z.maxHp), 6);
                }
            });
            
            // Draw bullets
            ctx.fillStyle = '#ffff00';
            ctx.shadowColor = '#ffff00';
            ctx.shadowBlur = 10;
            bullets.forEach(b => {
                ctx.fillRect(b.x, b.y, b.width, b.height);
            });
            ctx.shadowBlur = 0;
            
            // Draw particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }
        
        function startGame() {
            initAudio();
            gameRunning = true;
            score = 0;
            wave = 1;
            health = 100;
            ammo = 20;
            frameCount = 0;
            zombies = [];
            bullets = [];
            particles = [];
            player.reset();
            
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('controls').classList.remove('hidden');
            
            updateUI();
            updateGame();
        }
        
        function gameOver() {
            gameRunning = false;
            
            const highScore = Math.max(score, parseInt(localStorage.getItem('zombieDefenseHighScore') || '0'));
            localStorage.setItem('zombieDefenseHighScore', Math.max(score, highScore).toString());
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalWave').textContent = wave;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('controls').classList.add('hidden');
        }
        
        // Event listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        // Touch controls
        let moveLeft = false, moveRight = false;
        
        document.getElementById('leftBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveLeft = true;
        });
        document.getElementById('leftBtn').addEventListener('touchend', (e) => {
            e.preventDefault();
            moveLeft = false;
        });
        
        document.getElementById('rightBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveRight = true;
        });
        document.getElementById('rightBtn').addEventListener('touchend', (e) => {
            e.preventDefault();
            moveRight = false;
        });
        
        document.getElementById('shootBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (gameRunning) shoot();
        });
        document.getElementById('shootBtn').addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (gameRunning) shoot();
        });
        
        document.getElementById('reloadBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (gameRunning) reload();
        });
        document.getElementById('reloadBtn').addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (gameRunning) reload();
        });
        
        // Canvas click to shoot
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning) shoot();
        });
        canvas.addEventListener('mousedown', (e) => {
            if (gameRunning) shoot();
        });
        
        // Keyboard controls
        let shootPressed = false;
        
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') { e.preventDefault(); moveLeft = true; }
            if (e.code === 'ArrowRight' || e.code === 'KeyD') { e.preventDefault(); moveRight = true; }
            if ((e.code === 'Space' || e.code === 'KeyZ' || e.code === 'KeyK') && !shootPressed) {
                e.preventDefault();
                shootPressed = true;
                shoot();
            }
            if (e.code === 'KeyR' || e.code === 'KeyQ') { e.preventDefault(); reload(); }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') moveRight = false;
            if (e.code === 'Space' || e.code === 'KeyZ' || e.code === 'KeyK') shootPressed = false;
        });
        
        // Game loop for movement
        setInterval(() => {
            if (!gameRunning) return;
            if (moveLeft) player.move(-1);
            if (moveRight) player.move(1);
        }, 1000/60);
        
        // Sound toggle
        document.getElementById('soundToggle').addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            document.getElementById('soundToggle').textContent = soundEnabled ? '🔊' : '🔇';
        });
        
        // Initial draw
        player.groundY = canvas.height - 80;
        player.reset();
        drawGame();
    </script>
</body>
</html>
