<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Bubble Pop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; margin: 0; padding: 0; background: #0B0C10; font-family: system-ui, sans-serif; position: fixed; touch-action: none; }
    #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0; }
    
    .ui-bar { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin-bottom: 12px; }
    .stat { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 8px 16px; text-align: center; }
    .stat-label { font-size: 10px; color: #9CA3AF; text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 20px; font-weight: 800; color: white; }
    .score-value { color: #06B6D4; }
    .time-value { color: #F59E0B; }
    .high-value { color: #FBBF24; }
    
    #game-canvas { display: block; border-radius: 16px; background: linear-gradient(180deg, #1e1b4b 0%, #0f172a 100%); }
    
    .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, rgba(88,28,135,0.95), rgba(6,182,212,0.95)); z-index: 10; padding: 24px; }
    .screen.hidden { display: none; }
    .screen-title { font-size: 42px; font-weight: 800; color: white; text-shadow: 0 4px 20px rgba(0,0,0,0.3); margin-bottom: 8px; }
    .screen-subtitle { font-size: 16px; color: rgba(255,255,255,0.8); margin-bottom: 32px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; font-size: 16px; font-weight: 700; color: white; background: linear-gradient(135deg, #8B5CF6, #06B6D4); border: none; border-radius: 50px; cursor: pointer; transition: transform 0.1s; box-shadow: 0 0 30px rgba(168,85,247,0.5); }
    .btn:active { transform: scale(0.95); }
    .btn-outline { background: rgba(255,255,255,0.2); box-shadow: none; margin-top: 12px; }
    .final-score { font-size: 64px; font-weight: 800; color: #06B6D4; }
    .final-label { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 24px; }
    .instructions { text-align: center; color: rgba(255,255,255,0.7); font-size: 14px; max-width: 280px; line-height: 1.6; margin-bottom: 24px; }
  </style>
</head>
<body>
  <div id="game-container">
    <div class="ui-bar">
      <div class="stat"><div class="stat-label">Score</div><div class="stat-value score-value" id="score">0</div></div>
      <div class="stat"><div class="stat-label">Time</div><div class="stat-value time-value" id="time">60</div></div>
      <div class="stat"><div class="stat-label">Best</div><div class="stat-value high-value" id="high">0</div></div>
    </div>
    <canvas id="game-canvas"></canvas>
    
    <div id="menu-screen" class="screen">
      <div class="screen-title">Bubble Pop</div>
      <div class="screen-subtitle">Pop bubbles for points!</div>
      <p class="instructions">Tap the bubbles before they escape!<br>Big bubbles = More points!</p>
      <button class="btn" id="start-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Play</button>
    </div>
    
    <div id="gameover-screen" class="screen hidden">
      <div class="screen-title">Time's Up!</div>
      <div class="final-score" id="final-score">0</div>
      <div class="final-label">Final Score</div>
      <button class="btn" id="restart-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>Play Again</button>
      <button class="btn btn-outline" id="menu-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Menu</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');
    const highEl = document.getElementById('high');
    const menuScreen = document.getElementById('menu-screen');
    const gameoverScreen = document.getElementById('gameover-screen');
    const finalScoreEl = document.getElementById('final-score');
    
    const colors = ['#EF4444', '#F59E0B', '#22C55E', '#3B82F6', '#8B5CF6', '#EC4899', '#06B6D4'];
    let bubbles = [], particles = [], score = 0, timeLeft = 60, highScore = parseInt(localStorage.getItem('bubblePopHighScore') || '0');
    let gameRunning = false, lastTime = 0, spawnTimer = 0, timerInterval;
    
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    
    function createBubble() {
      const size = 20 + Math.random() * 40;
      bubbles.push({
        x: size + Math.random() * (canvas.width - size * 2),
        y: canvas.height + size,
        size,
        speed: 0.5 + Math.random() * 1.5,
        color: colors[Math.floor(Math.random() * colors.length)],
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.02 + Math.random() * 0.03
      });
    }
    
    function createPopParticles(x, y, color) {
      for (let i = 0; i < 8; i++) {
        const angle = (Math.PI * 2 / 8) * i;
        particles.push({
          x, y,
          vx: Math.cos(angle) * 3,
          vy: Math.sin(angle) * 3,
          size: 4 + Math.random() * 4,
          color,
          life: 1
        });
      }
    }
    
    function popBubble(bubble, index) {
      const points = Math.floor(bubble.size);
      score += points;
      scoreEl.textContent = score;
      createPopParticles(bubble.x, bubble.y, bubble.color);
      bubbles.splice(index, 1);
    }
    
    function update(dt) {
      spawnTimer += dt;
      if (spawnTimer > 400) {
        spawnTimer = 0;
        createBubble();
        if (Math.random() < 0.3) createBubble();
      }
      
      bubbles.forEach((b, i) => {
        b.y -= b.speed;
        b.wobble += b.wobbleSpeed;
        b.x += Math.sin(b.wobble) * 0.5;
        if (b.y + b.size < 0) {
          bubbles.splice(i, 1);
          score = Math.max(0, score - 5);
          scoreEl.textContent = score;
        }
      });
      
      particles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.life -= 0.03;
        if (p.life <= 0) particles.splice(i, 1);
      });
    }
    
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, 'rgba(30, 27, 75, 0.8)');
      gradient.addColorStop(1, 'rgba(15, 23, 42, 0.8)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      bubbles.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(b.x - b.size*0.3, b.y - b.size*0.3, 0, b.x, b.y, b.size);
        grad.addColorStop(0, 'rgba(255,255,255,0.8)');
        grad.addColorStop(0.3, b.color);
        grad.addColorStop(1, b.color);
        ctx.fillStyle = grad;
        ctx.fill();
        
        ctx.beginPath();
        ctx.arc(b.x - b.size*0.3, b.y - b.size*0.3, b.size*0.2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fill();
      });
      
      particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }
    
    function gameLoop(timestamp) {
      if (!gameRunning) return;
      const dt = timestamp - lastTime;
      lastTime = timestamp;
      update(dt);
      draw();
      if (gameRunning) requestAnimationFrame(gameLoop);
    }
    
    function handleClick(e) {
      if (!gameRunning) return;
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
      const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
      
      for (let i = bubbles.length - 1; i >= 0; i--) {
        const b = bubbles[i];
        const dx = x - b.x, dy = y - b.y;
        if (dx*dx + dy*dy < b.size*b.size) {
          popBubble(b, i);
          return;
        }
      }
    }
    
    function startGame() {
      bubbles = [];
      particles = [];
      score = 0;
      timeLeft = 60;
      scoreEl.textContent = '0';
      timeEl.textContent = '60';
      gameRunning = true;
      menuScreen.classList.add('hidden');
      gameoverScreen.classList.add('hidden');
      
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (gameRunning) {
          timeLeft--;
          timeEl.textContent = timeLeft;
          if (timeLeft <= 0) endGame();
        }
      }, 1000);
      
      lastTime = 0;
      requestAnimationFrame(gameLoop);
    }
    
    function endGame() {
      gameRunning = false;
      clearInterval(timerInterval);
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('bubblePopHighScore', highScore);
        highEl.textContent = highScore;
      }
      finalScoreEl.textContent = score;
      gameoverScreen.classList.remove('hidden');
      
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'gameScore', score: score, gameSlug: 'bubble-pop' }, '*');
      }
    }
    
    function showMenu() {
      gameRunning = false;
      clearInterval(timerInterval);
      menuScreen.classList.remove('hidden');
      gameoverScreen.classList.add('hidden');
    }
    
    canvas.addEventListener('click', handleClick);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); handleClick(e); }, { passive: false });
    
    document.getElementById('start-btn').onclick = startGame;
    document.getElementById('restart-btn').onclick = startGame;
    document.getElementById('menu-btn').onclick = showMenu;
    
    window.addEventListener('resize', resize);
    resize();
    highEl.textContent = highScore;
    draw();
    
    window.parent.postMessage({ type: 'gameReady', gameSlug: 'bubble-pop' }, '*');
  </script>
</body>
</html>
