<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Fruit Slice</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; margin: 0; padding: 0; background: #0B0C10; font-family: system-ui, sans-serif; position: fixed; touch-action: none; }
    #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0; }
    
    .ui-bar { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin-bottom: 12px; }
    .stat { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 8px 16px; text-align: center; }
    .stat-label { font-size: 10px; color: #9CA3AF; text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 20px; font-weight: 800; color: white; }
    .score-value { color: #06B6D4; }
    .time-value { color: #F59E0B; }
    .high-value { color: #FBBF24; }
    .lives-value { color: #EF4444; }
    
    #game-canvas { display: block; border-radius: 16px; background: linear-gradient(180deg, #1e3a5f 0%, #0f172a 100%); }
    
    .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, rgba(88,28,135,0.95), rgba(6,182,212,0.95)); z-index: 10; padding: 24px; }
    .screen.hidden { display: none; }
    .screen-title { font-size: 42px; font-weight: 800; color: white; text-shadow: 0 4px 20px rgba(0,0,0,0.3); margin-bottom: 8px; }
    .screen-subtitle { font-size: 16px; color: rgba(255,255,255,0.8); margin-bottom: 32px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; font-size: 16px; font-weight: 700; color: white; background: linear-gradient(135deg, #8B5CF6, #06B6D4); border: none; border-radius: 50px; cursor: pointer; transition: transform 0.1s; box-shadow: 0 0 30px rgba(168,85,247,0.5); }
    .btn:active { transform: scale(0.95); }
    .btn-outline { background: rgba(255,255,255,0.2); box-shadow: none; margin-top: 12px; }
    .final-score { font-size: 64px; font-weight: 800; color: #06B6D4; }
    .final-label { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 24px; }
    .instructions { text-align: center; color: rgba(255,255,255,0.7); font-size: 14px; max-width: 280px; line-height: 1.6; margin-bottom: 24px; }
  </style>
</head>
<body>
  <div id="game-container">
    <div class="ui-bar">
      <div class="stat"><div class="stat-label">Score</div><div class="stat-value score-value" id="score">0</div></div>
      <div class="stat"><div class="stat-label">Lives</div><div class="stat-value lives-value" id="lives">3</div></div>
      <div class="stat"><div class="stat-label">Best</div><div class="stat-value high-value" id="high">0</div></div>
    </div>
    <canvas id="game-canvas"></canvas>
    
    <div id="menu-screen" class="screen">
      <div class="screen-title">Fruit Slice</div>
      <div class="screen-subtitle">Slice fruits with swift swipes!</div>
      <p class="instructions">Swipe to slice the fruits!<br>Miss 3 fruits and it's game over!</p>
      <button class="btn" id="start-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Play</button>
    </div>
    
    <div id="gameover-screen" class="screen hidden">
      <div class="screen-title">Game Over!</div>
      <div class="final-score" id="final-score">0</div>
      <div class="final-label">Final Score</div>
      <button class="btn" id="restart-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>Play Again</button>
      <button class="btn btn-outline" id="menu-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Menu</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const highEl = document.getElementById('high');
    const menuScreen = document.getElementById('menu-screen');
    const gameoverScreen = document.getElementById('gameover-screen');
    const finalScoreEl = document.getElementById('final-score');
    
    const fruitTypes = [
      { name: 'apple', color: '#EF4444', radius: 30 },
      { name: 'orange', color: '#F59E0B', radius: 32 },
      { name: 'watermelon', color: '#22C55E', radius: 40 },
      { name: 'grape', color: '#8B5CF6', radius: 25 },
      { name: 'strawberry', color: '#EC4899', radius: 28 },
    ];
    
    let fruits = [], slices = [], particles = [], score = 0, lives = 3, highScore = parseInt(localStorage.getItem('fruitSliceHighScore') || '0');
    let gameRunning = false, lastTime = 0, spawnTimer = 0, combo = 0, comboTimer = 0;
    let slicePath = [], isSlicing = false;
    
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    
    function createFruit() {
      const type = fruitTypes[Math.floor(Math.random() * fruitTypes.length)];
      const side = Math.random() < 0.5 ? -1 : 1;
      fruits.push({
        x: canvas.width * 0.2 + Math.random() * canvas.width * 0.6,
        y: canvas.height + type.radius,
        vx: (Math.random() - 0.5) * 4 * side,
        vy: -12 - Math.random() * 6,
        rotation: 0,
        rotationSpeed: (Math.random() - 0.5) * 0.1,
        type,
        sliced: false,
        sliceAngle: 0
      });
    }
    
    function sliceFruit(fruit) {
      fruit.sliced = true;
      fruit.sliceAngle = Math.random() * Math.PI;
      combo++;
      comboTimer = 30;
      const points = 10 * Math.min(combo, 5);
      score += points;
      scoreEl.textContent = score;
      
      const half1 = { x: fruit.x, y: fruit.y, vx: fruit.vx - 2, vy: fruit.vy - 3, type: fruit.type, rotation: fruit.rotation, sliced: true, sliceAngle: fruit.sliceAngle, half: 1 };
      const half2 = { x: fruit.x, y: fruit.y, vx: fruit.vx + 2, vy: fruit.vy - 3, type: fruit.type, rotation: fruit.rotation, sliced: true, sliceAngle: fruit.sliceAngle + Math.PI, half: 2 };
      slices.push(half1, half2);
      
      for (let i = 0; i < 6; i++) {
        particles.push({
          x: fruit.x, y: fruit.y,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6 - 2,
          size: 3 + Math.random() * 4,
          color: fruit.type.color,
          life: 1
        });
      }
    }
    
    function checkSlice(x1, y1, x2, y2) {
      const dx = x2 - x1, dy = y2 - y1;
      const len = Math.sqrt(dx*dx + dy*dy);
      if (len < 20) return;
      
      const nx = -dy / len, ny = dx / len;
      
      for (let i = fruits.length - 1; i >= 0; i--) {
        const f = fruits[i];
        const fx = f.x - x1, fy = f.y - y1;
        const proj = fx * dx / len + fy * dy / len;
        const dist = Math.abs(fx * nx + fy * ny);
        
        if (proj > 0 && proj < len && dist < f.type.radius) {
          sliceFruit(f);
          fruits.splice(i, 1);
        }
      }
    }
    
    function update(dt) {
      if (comboTimer > 0) comboTimer--;
      else combo = 0;
      
      spawnTimer += dt;
      if (spawnTimer > 800) {
        spawnTimer = 0;
        createFruit();
        if (Math.random() < 0.3) createFruit();
      }
      
      fruits.forEach((f, i) => {
        f.vy += 0.3;
        f.x += f.vx;
        f.y += f.vy;
        f.rotation += f.rotationSpeed;
        
        if (f.y > canvas.height + f.type.radius * 2) {
          fruits.splice(i, 1);
          lives--;
          livesEl.textContent = lives;
          combo = 0;
          if (lives <= 0) endGame();
        }
      });
      
      slices.forEach((s, i) => {
        s.vy += 0.3;
        s.x += s.vx;
        s.y += s.vy;
        s.rotation += s.rotationSpeed;
        
        if (s.y > canvas.height + 100) slices.splice(i, 1);
      });
      
      particles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
      });
    }
    
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, 'rgba(30, 58, 95, 0.8)');
      grad.addColorStop(1, 'rgba(15, 23, 42, 0.8)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      if (isSlicing && slicePath.length > 1) {
        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(slicePath[0].x, slicePath[0].y);
        for (let i = 1; i < slicePath.length; i++) ctx.lineTo(slicePath[i].x, slicePath[i].y);
        ctx.stroke();
      }
      
      const drawFruit = (f) => {
        ctx.save();
        ctx.translate(f.x, f.y);
        ctx.rotate(f.rotation);
        
        ctx.beginPath();
        ctx.arc(0, 0, f.type.radius, 0, Math.PI * 2);
        
        if (f.sliced) {
          ctx.save();
          ctx.clip();
          ctx.fillStyle = f.type.color;
          ctx.fill();
          
          ctx.fillStyle = f.type.color === '#22C55E' ? '#DC2626' : 'rgba(255,200,150,0.8)';
          ctx.fillRect(-f.type.radius, -2, f.type.radius * 2, 4);
          ctx.restore();
        } else {
          const grad = ctx.createRadialGradient(-f.type.radius*0.3, -f.type.radius*0.3, 0, 0, 0, f.type.radius);
          grad.addColorStop(0, 'rgba(255,255,255,0.4)');
          grad.addColorStop(0.3, f.type.color);
          grad.addColorStop(1, f.type.color);
          ctx.fillStyle = grad;
          ctx.fill();
        }
        ctx.restore();
      };
      
      fruits.forEach(drawFruit);
      slices.forEach(drawFruit);
      
      particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }
    
    function gameLoop(timestamp) {
      if (!gameRunning) return;
      const dt = timestamp - lastTime;
      lastTime = timestamp;
      update(dt);
      draw();
      if (gameRunning) requestAnimationFrame(gameLoop);
    }
    
    let touchStart = null;
    
    function handleStart(e) {
      if (!gameRunning) return;
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
      const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
      touchStart = { x, y };
      slicePath = [{ x, y }];
      isSlicing = true;
    }
    
    function handleMove(e) {
      if (!isSlicing || !gameRunning) return;
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
      const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
      slicePath.push({ x, y });
      if (slicePath.length > 10) slicePath.shift();
      checkSlice(slicePath[0].x, slicePath[0].y, x, y);
      slicePath[0] = { x, y };
    }
    
    function handleEnd(e) {
      isSlicing = false;
      slicePath = [];
    }
    
    function startGame() {
      fruits = [];
      slices = [];
      particles = [];
      score = 0;
      lives = 3;
      combo = 0;
      scoreEl.textContent = '0';
      livesEl.textContent = '3';
      gameRunning = true;
      menuScreen.classList.add('hidden');
      gameoverScreen.classList.add('hidden');
      lastTime = 0;
      requestAnimationFrame(gameLoop);
    }
    
    function endGame() {
      gameRunning = false;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('fruitSliceHighScore', highScore);
        highEl.textContent = highScore;
      }
      finalScoreEl.textContent = score;
      gameoverScreen.classList.remove('hidden');
      
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'gameScore', score: score, gameSlug: 'fruit-slice' }, '*');
      }
    }
    
    function showMenu() {
      gameRunning = false;
      menuScreen.classList.remove('hidden');
      gameoverScreen.classList.add('hidden');
    }
    
    canvas.addEventListener('mousedown', handleStart);
    canvas.addEventListener('mousemove', handleMove);
    canvas.addEventListener('mouseup', handleEnd);
    canvas.addEventListener('touchstart', handleStart, { passive: false });
    canvas.addEventListener('touchmove', handleMove, { passive: false });
    canvas.addEventListener('touchend', handleEnd);
    
    document.getElementById('start-btn').onclick = startGame;
    document.getElementById('restart-btn').onclick = startGame;
    document.getElementById('menu-btn').onclick = showMenu;
    
    window.addEventListener('resize', resize);
    resize();
    highEl.textContent = highScore;
    draw();
    
    window.parent.postMessage({ type: 'gameReady', gameSlug: 'fruit-slice' }, '*');
  </script>
</body>
</html>
