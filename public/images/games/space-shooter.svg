<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" width="500" height="700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="50%" style="stop-color:#1a0a3e"/>
      <stop offset="100%" style="stop-color:#0a0a2e"/>
    </linearGradient>
    <radialGradient id="nebula1" cx="30%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:rgba(100,0,150,0.3)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="70%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:rgba(0,100,150,0.2)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <linearGradient id="shipGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#0088aa"/>
    </linearGradient>
    <linearGradient id="enemyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:#aa2222"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="500" height="700" fill="url(#bg)"/>
  <rect width="500" height="700" fill="url(#nebula1)"/>
  <rect width="500" height="700" fill="url(#nebula2)"/>
  <g fill="white" opacity="0.8">
    <circle cx="50" cy="80" r="1.5"/>
    <circle cx="120" cy="150" r="1"/>
    <circle cx="200" cy="60" r="2"/>
    <circle cx="300" cy="120" r="1"/>
    <circle cx="380" cy="50" r="1.5"/>
    <circle cx="450" cy="180" r="1"/>
    <circle cx="80" cy="250" r="1"/>
    <circle cx="180" cy="300" r="1.5"/>
    <circle cx="350" cy="280" r="1"/>
    <circle cx="420" cy="350" r="2"/>
    <circle cx="60" cy="420" r="1"/>
    <circle cx="280" cy="400" r="1"/>
    <circle cx="150" cy="500" r="1.5"/>
    <circle cx="400" cy="480" r="1"/>
    <circle cx="320" cy="550" r="2"/>
    <circle cx="90" cy="600" r="1"/>
    <circle cx="250" cy="620" r="1"/>
    <circle cx="450" cy="620" r="1.5"/>
    <circle cx="30" cy="350" r="1"/>
    <circle cx="470" cy="250" r="1"/>
  </g>
  <polygon points="250,620 220,700 280,700" fill="#00aaff" opacity="0.3"/>
  <polygon points="250,640 235,695 265,695" fill="#00ffff" opacity="0.5" filter="url(#glow)"/>
  <g filter="url(#glow)">
    <polygon points="250,520 210,600 230,580 270,580 290,600" fill="url(#enemyGrad)"/>
    <polygon points="250,550 230,570 270,570" fill="#aa0000"/>
    <circle cx="238" cy="555" r="4" fill="#ff0000"/>
    <circle cx="262" cy="555" r="4" fill="#ff0000"/>
  </g>
  <g filter="url(#glow)">
    <polygon points="120,350 90,410 105,395 135,395 150,410" fill="url(#enemyGrad)" transform="rotate(180 120 380)"/>
    <polygon points="120,380 105,395 135,395" fill="#aa0000"/>
    <circle cx="112" cy="370" r="3" fill="#ff0000"/>
    <circle cx="128" cy="370" r="3" fill="#ff0000"/>
  </g>
  <g filter="url(#glow)">
    <polygon points="380,250 350,310 365,295 395,295 410,310" fill="url(#enemyGrad)" transform="rotate(180 380 280)"/>
    <polygon points="380,280 365,295 395,295" fill="#aa0000"/>
    <circle cx="372" cy="270" r="3" fill="#ff0000"/>
    <circle cx="388" cy="270" r="3" fill="#ff0000"/>
  </g>
  <g filter="url(#strongGlow)">
    <polygon points="250,180 200,280 225,250 250,270 275,250 300,280" fill="url(#shipGrad)"/>
    <polygon points="250,210 225,250 275,250" fill="#004466"/>
    <polygon points="250,150 235,185 265,185" fill="white" opacity="0.5"/>
    <circle cx="235" cy="230" r="6" fill="#00aaff"/>
    <circle cx="265" cy="230" r="6" fill="#00aaff"/>
    <circle cx="238" cy="160" r="4" fill="white" opacity="0.8"/>
    <circle cx="262" cy="160" r="4" fill="white" opacity="0.8"/>
  </g>
  <rect x="246" y="120" width="8" height="30" fill="#00ffff" filter="url(#glow)" opacity="0.7"/>
  <g filter="url(#glow)">
    <polygon points="120,150 110,180 120,175 130,180" fill="#ff4444" opacity="0.8"/>
    <polygon points="380,180 370,210 380,205 390,210" fill="#ff4444" opacity="0.8"/>
    <polygon points="250,100 240,130 250,125 260,130" fill="#ff4444" opacity="0.9"/>
  </g>
  <g fill="#ffaa00" font-family="Orbitron, sans-serif" font-weight="900" text-anchor="middle" filter="url(#glow)">
    <text x="250" y="80" font-size="52">SPACE</text>
    <text x="250" y="130" font-size="52">SHOOTER</text>
  </g>
  <g font-family="Orbitron, sans-serif" text-anchor="middle">
    <text x="250" y="665" font-size="16" fill="#00ffff" opacity="0.8" letter-spacing="4">GALACTIC WARFARE</text>
  </g>
  <g fill="#ff00aa" opacity="0.6">
    <circle cx="50" cy="650" r="2"/>
    <circle cx="450" cy="650" r="2"/>
    <circle cx="50" cy="50" r="2"/>
    <circle cx="450" cy="50" r="2"/>
    <circle cx="50" cy="350" r="2"/>
    <circle cx="450" cy="350" r="2"/>
  </g>
  <rect x="0" y="695" width="500" height="5" fill="#00ffff" opacity="0.2"/>
</svg>